name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Signed Release APK
        # The app/build.gradle.kts is configured to use the committed keystore.jks for release builds.
        # This guarantees the output is a signed, installable APK with consistent signatures for OTA updates.
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Because it is signed, the output file drops the '-unsigned' suffix
          path: app/build/outputs/apk/release/app-release.apk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download APK from build
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          tag_name: ${{ github.ref_name }} # You can change this manually or use github tag ref
          name: "Release Biology Practice Tester"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
